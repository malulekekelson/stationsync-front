name: stationsync
description: StationSync - Digital Petroleum Licence Application System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^3.3.1
  
  # Networking
  dio: ^5.4.0
  dio_smart_retry: ^7.0.1
  
  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  
  # File Upload
  image_picker: ^1.0.7
  file_picker: ^10.0.0
  
  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # UI Components
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  
  # Forms & Validation
  reactive_forms: ^18.2.2
  
  # Location
  geolocator: ^14.0.2
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.5
  share_plus: ^12.0.1
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  
  # QR Code for 2FA
  qr_flutter: ^4.1.0
  
  # Animations
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.jpeg"
  adaptive_icon_background: "#1A5F7A"
  adaptive_icon_foreground: "assets/logo/app_logo.jpeg"